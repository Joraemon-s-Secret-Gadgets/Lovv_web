name: SKN_3rd_PJ Discord Reminders

on:
  schedule:
    # 17:00 KST, Monday-Friday.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Send Discord message
        env:
          MESSAGE: 오후 5시입니다. 오늘 각자 진행상황을 팀 Notion에 업로드해주세요.
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL GitHub secret is not configured."
            exit 1
          fi

          payload=$(jq -nc \
            --arg content "$MESSAGE" \
            --arg username "Notion 알림봇" \
            '{content: $content, username: $username}')

          curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --header "User-Agent: SKN_3rd_PJ Reminder Bot (GitHub Actions)" \
            --data "$payload" \
            "$DISCORD_WEBHOOK_URL"
